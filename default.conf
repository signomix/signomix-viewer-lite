server {
    listen       8080;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Bezpieczeństwo: Ukrywanie wersji Nginx
    server_tokens off;

    # Nagłówki bezpieczeństwa HTTP
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Obsługa PWA: brakujący zasób przekierowuje do index.html (fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service Worker nie może być cachowany przez serwer, żeby aktualizacje działały
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    # Optymalizacja: cache dla plików statycznych
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webmanifest|json)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
